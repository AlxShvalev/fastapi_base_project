services:

  db:
    image: postgres:16.13-alpine
    container_name: postgres_db
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg-isready", "-d", "${DB_NAME}"]
      interval: 10s
      timeout: 60s
      retries: 5
      start_period: 10s
    env_file:
      - .env
      - .env.docker
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:6-alpine
    env_file:
      - .env
    command:
#      - /usr/local/etc/redis/redis.conf
      - "--requirepass ${REDIS_PASS}"
    restart: always
    ports:
      - "${REDIS_PORT}:6379"

volumes:
  postgres_data:
